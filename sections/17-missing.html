  <section id="missing">
    <div class="section-header">
      <p class="section-label">17 — Auditoria</p>
      <h2 class="section-title">Gaps & Roadmap</h2>
      <p class="section-desc">Componentes e tokens identificados mas ainda não implementados. Expandir para ver detalhes.</p>
    </div>

    <!-- Collapsible wrapper -->
    <div style="border:1px solid var(--border);border-radius:12px;overflow:hidden;">

      <!-- Toggle header -->
      <button onclick="this.parentElement.classList.toggle('gaps-open')"
        style="width:100%;display:flex;align-items:center;justify-content:space-between;
               padding:14px 18px;background:var(--surf);border:none;cursor:pointer;
               color:var(--text);text-align:left;gap:12px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:14px;font-weight:700;color:var(--text);">Ver gaps identificados</span>
          <span style="font-size:10px;font-weight:700;background:var(--warnFaint);color:var(--warn);
                       border:1px solid rgba(245,197,66,0.35);border-radius:6px;padding:2px 8px;">2 itens</span>
        </div>
        <svg class="gaps-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             style="transition:transform 0.2s;flex-shrink:0;">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      <!-- Collapsible body -->
      <div class="gaps-body" style="display:none;padding:16px 18px;border-top:1px solid var(--border);
                                    background:var(--bg);display:flex;flex-direction:column;gap:10px;">

        <label style="display:flex;align-items:flex-start;gap:12px;cursor:pointer;">
          <input type="checkbox" style="margin-top:3px;accent-color:var(--pri);" />
          <div>
            <p style="font-size:13px;font-weight:700;color:var(--text);">Sistema de toast/snackbar</p>
            <p style="font-size:12px;color:var(--muted);margin-top:2px;">Implementar no app (padrão visual já definido na seção 19).</p>
          </div>
        </label>

        <label style="display:flex;align-items:flex-start;gap:12px;cursor:pointer;">
          <input type="checkbox" style="margin-top:3px;accent-color:var(--pri);" />
          <div>
            <p style="font-size:13px;font-weight:700;color:var(--text);">Tooltip / Popover</p>
            <p style="font-size:12px;color:var(--muted);margin-top:2px;">Implementar no app (padrão visual já definido na seção 21).</p>
          </div>
        </label>

      </div>
    </div>

    <style>
      .gaps-open .gaps-chevron { transform: rotate(180deg); }
      .gaps-open .gaps-body { display: flex !important; }
    </style>
  </section>
